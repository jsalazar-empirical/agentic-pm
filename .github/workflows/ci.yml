name: CI

# Every PR to main must be green: unit tier (node:test) + E2E tier (Playwright).
# A red check blocks merge (enforced by the /sdd-merge gate).
on:
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests (node:test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E (Playwright, Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Generation is mocked in the specs, so no Anthropic API key is needed here.
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
